# Backend CI/CD Pipeline
# Triggers: push to main, or PR targeting main
# Jobs: lint → unit tests → integration tests → deploy to Render

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        run: pip install ruff==0.4.4

      - name: Run ruff linter
        run: ruff check . --select E,F,W --ignore E501
        # E501 = line too long — we allow longer lines for readability

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          GEMINI_API_KEY:      test-key-ci
          SUPABASE_URL:        https://test.supabase.co
          SUPABASE_ANON_KEY:   test-anon-key
          SUPABASE_SERVICE_KEY: test-service-key
          ALLOWED_ORIGINS:     http://localhost:5173
        run: pytest -m unit --no-cov -v

  # ── Job 3: Integration tests ──────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        env:
          GEMINI_API_KEY:      test-key-ci
          SUPABASE_URL:        https://test.supabase.co
          SUPABASE_ANON_KEY:   test-anon-key
          SUPABASE_SERVICE_KEY: test-service-key
          ALLOWED_ORIGINS:     http://localhost:5173
        run: |
          pytest -m integration \
            --no-cov \
            -v \
            --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/htmlcov/
          retention-days: 7

  # ── Job 4: Deploy to Render ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    # Only deploy on pushes to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        # Render provides a deploy hook URL — we call it to trigger a redeploy
        # Set RENDER_DEPLOY_HOOK_URL in GitHub Secrets
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail \
            --retry 3
          echo "Render deploy triggered successfully"

      - name: Wait for Render to come online
        run: |
          echo "Waiting 90 seconds for Render to build and start..."
          sleep 90

      - name: Smoke test deployed backend
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_BACKEND_URL }}/api/v1/ping")
          if [ "$RESPONSE" = "200" ]; then
            echo "Backend is live and responding — deploy successful"
          else
            echo "Backend smoke test failed — HTTP $RESPONSE"
            exit 1
          fi