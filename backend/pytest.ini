[pytest]
asyncio_mode        = auto
testpaths           = tests
python_files        = test_*.py
python_classes      = Test*
python_functions    = test_*
addopts             =
    --tb=short
    --strict-markers
    -v
    --cov=api
    --cov=scraper
    --cov=embeddings
    --cov=database
    --cov-report=term-missing
    --cov-report=html:htmlcov
markers =
    unit: marks tests as unit tests (no network, no DB)
    integration: marks tests as integration tests (needs running app)
    slow: marks tests as slow (skipped by default in CI)